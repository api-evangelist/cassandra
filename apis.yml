  https://raw.githubusercontent.com/api-evangelist/cassandra/refs/heads/main/apis.yml
name: Apache Cassandra
tags:
  - Apache
  - Big Data
  - Database
  - Distributed
  - NoSQL
  - Open Source
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
access: 3rd-Party
created: '2024-01-01'
modified: '2026-04-23'
position: Consumer
description: >-
  Apache Cassandra is a highly scalable, distributed open-source NoSQL database
  designed to handle massive amounts of data across many commodity servers,
  providing high availability with no single point of failure. It is governed
  by the Apache Software Foundation (ASF) under the Apache License 2.0 and is
  used in production by Netflix, Apple, Bloomberg, Backblaze, and many others.
  Cassandra exposes its CQL native protocol for clients and a family of HTTP,
  REST, GraphQL, Document, and gRPC APIs via the Stargate data gateway.
apis:
  - aid: cassandra:cassandra-cql-native-protocol
    name: Apache Cassandra CQL Native Protocol
    tags:
      - CQL
      - Database
      - Native Protocol
      - Query
    humanURL: https://cassandra.apache.org/doc/latest/cassandra/cql/
    properties:
      - url: https://cassandra.apache.org/doc/latest/cassandra/cql/
        type: Documentation
      - url: https://github.com/apache/cassandra/blob/trunk/doc/native_protocol_v5.spec
        type: Specification
      - url: https://cassandra.apache.org/doc/latest/cassandra/cql/ddl.html
        type: Reference
    description: >-
      Cassandra Query Language (CQL) is the primary interface to Apache
      Cassandra. Clients speak the binary CQL native protocol over TCP
      (default port 9042). Official drivers are maintained for Java, Python,
      Go, C/C++, C#, Node.js, Ruby, and Rust.
  - aid: cassandra:cassandra-rest-api-stargate
    name: Cassandra REST API (Stargate)
    tags:
      - Database
      - REST
      - Stargate
    humanURL: https://stargate.io/docs/latest/develop/api-rest/
    properties:
      - url: https://stargate.io/docs/latest/develop/api-rest/
        type: Documentation
      - url: https://stargate.io/docs/latest/develop/api-rest/swagger.html
        type: Swagger
      - url: https://github.com/stargate/stargate
        type: SourceCode
    description: >-
      HTTP/JSON REST API for Cassandra provided by the Stargate data gateway.
      Enables CRUD operations and SQL-like query via REST without the CQL
      driver.
  - aid: cassandra:cassandra-graphql-api-stargate
    name: Cassandra GraphQL API (Stargate)
    tags:
      - Database
      - GraphQL
      - Stargate
    humanURL: https://stargate.io/docs/latest/develop/api-graphql/
    properties:
      - url: https://stargate.io/docs/latest/develop/api-graphql/
        type: Documentation
      - url: https://stargate.io/docs/latest/develop/api-graphql/graphql-using.html
        type: Reference
    description: >-
      GraphQL endpoint for Cassandra, enabling flexible, typed queries and
      mutations against Cassandra tables through the Stargate gateway.
  - aid: cassandra:cassandra-document-api-stargate
    name: Cassandra Document API (Stargate)
    tags:
      - Database
      - Document
      - JSON
      - Stargate
    humanURL: https://stargate.io/docs/latest/develop/api-doc/
    properties:
      - url: https://stargate.io/docs/latest/develop/api-doc/
        type: Documentation
      - url: https://stargate.io/docs/latest/develop/api-doc/doc-using.html
        type: Reference
    description: >-
      Schemaless Document API that stores JSON documents in Cassandra,
      offering a MongoDB-like developer experience backed by Cassandra.
  - aid: cassandra:cassandra-grpc-api-stargate
    name: Cassandra gRPC API (Stargate)
    tags:
      - Database
      - gRPC
      - Stargate
    humanURL: https://stargate.io/docs/latest/develop/api-grpc/
    properties:
      - url: https://stargate.io/docs/latest/develop/api-grpc/
        type: Documentation
      - url: https://github.com/stargate/stargate/tree/main/grpc/proto
        type: Protocol
    description: >-
      High-performance gRPC API for Cassandra through Stargate, designed for
      low-latency service-to-service communication.
  - aid: cassandra:cassandra-jmx-metrics
    name: Cassandra JMX Management Interface
    tags:
      - JMX
      - Management
      - Metrics
      - Monitoring
    humanURL: https://cassandra.apache.org/doc/latest/cassandra/operating/metrics.html
    properties:
      - url: https://cassandra.apache.org/doc/latest/cassandra/operating/metrics.html
        type: Documentation
      - url: https://cassandra.apache.org/doc/latest/cassandra/operating/
        type: OperationsGuide
    description: >-
      Java Management Extensions (JMX) interface for monitoring and
      administering Cassandra nodes, including metrics, compaction, repairs,
      and configuration.
